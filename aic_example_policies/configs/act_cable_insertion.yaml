# ACT training recipe for LeRobot 0.5.1.
#
# This file is parsed directly by:
#   pixi run lerobot-train --config_path aic_example_policies/configs/act_cable_insertion.yaml
#
# Keep field names aligned with:
#   lerobot.configs.train.TrainPipelineConfig
#   lerobot.policies.act.configuration_act.ACTConfig

dataset:
  repo_id: local/aic-t1-demos
  image_transforms:
    enable: true
    max_num_transforms: 3
    random_order: true
    tfs:
      brightness:
        weight: 1.0
        type: ColorJitter
        kwargs:
          brightness: [0.7, 1.3]
      gaussian_blur:
        weight: 1.0
        type: GaussianBlur
        kwargs:
          kernel_size: 5
          sigma: [0.1, 2.0]
      random_erasing:
        weight: 0.4
        type: RandomErasing
        kwargs:
          p: 0.2
          scale: [0.1, 0.2]
          ratio: [0.3, 3.3]
          value: 0

policy:
  type: act

  # Must match CableInsertion.ACT_CHUNK_SIZE.
  chunk_size: 25
  n_action_steps: 25

  # LeRobot 0.5.1 infers input_features/output_features from dataset metadata.
  normalization_mapping:
    VISUAL: MEAN_STD
    STATE: MEAN_STD
    ACTION: MEAN_STD

  vision_backbone: resnet18
  pretrained_backbone_weights: ResNet18_Weights.IMAGENET1K_V1
  replace_final_stride_with_dilation: false
  pre_norm: false
  dim_model: 512
  n_heads: 8
  dim_feedforward: 3200
  feedforward_activation: relu
  n_encoder_layers: 4
  n_decoder_layers: 1
  use_vae: true
  latent_dim: 32
  n_vae_encoder_layers: 4
  kl_weight: 10.0
  dropout: 0.1

  optimizer_lr: 1.0e-5
  optimizer_lr_backbone: 1.0e-5
  optimizer_weight_decay: 1.0e-4

  device: cuda
  push_to_hub: false

output_dir: outputs/act_trial1
job_name: aic_act
batch_size: 8
steps: 100000
save_freq: 10000
eval_freq: 20000
log_freq: 200
num_workers: 4

eval:
  n_episodes: 5
  batch_size: 5
  use_async_envs: false

wandb:
  enable: false
